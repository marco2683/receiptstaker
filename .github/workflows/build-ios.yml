# Build iOS IPA — runs on macOS runners (no Mac needed!)
name: Build iOS

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
  workflow_dispatch: # Allow manual trigger

jobs:
  build-ios:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Sync Capacitor iOS
        run: npx cap sync ios

      # ---- Code Signing ----
      # This step imports your Apple certificate and provisioning profile
      # You need to set up these secrets in your GitHub repo settings first
      - name: Install Apple Certificate & Provisioning Profile
        if: env.BUILD_CERTIFICATE_BASE64 != ''
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          # Create variables
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          # Import certificate and provisioning profile from secrets
          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
          echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode -o $PP_PATH

          # Create temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # Import certificate to keychain
          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          # Apply provisioning profile
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles

      # ---- Build ----
      - name: Build iOS Archive
        run: |
          cd ios/App
          xcodebuild -workspace App.xcworkspace \
            -scheme App \
            -sdk iphoneos \
            -configuration Release \
            -archivePath $RUNNER_TEMP/App.xcarchive \
            archive \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_ALLOWED=NO \
            | tail -20

      # For unsigned build (testing only — can't install on device without signing)
      - name: Upload Archive
        uses: actions/upload-artifact@v4
        with:
          name: receipt-taker-ios-archive
          path: ${{ runner.temp }}/App.xcarchive
          retention-days: 30

      # ---- Signed IPA Export (uncomment after setting up secrets) ----
      # - name: Export IPA
      #   run: |
      #     cd ios/App
      #     xcodebuild -exportArchive \
      #       -archivePath $RUNNER_TEMP/App.xcarchive \
      #       -exportOptionsPlist ExportOptions.plist \
      #       -exportPath $RUNNER_TEMP/output \
      #       -allowProvisioningUpdates
      #
      # - name: Upload IPA
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: receipt-taker.ipa
      #     path: ${{ runner.temp }}/output/*.ipa
      #     retention-days: 30

      # ---- Cleanup ----
      - name: Clean up keychain
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db 2>/dev/null || true
