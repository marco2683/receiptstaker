# Codemagic CI/CD — builds Android APK + iOS IPA in the cloud
# Free tier: 500 build minutes/month on Apple Silicon M2
# Sign up at https://codemagic.io
#
# Setup:
# 1. Connect your GitHub repo to Codemagic
# 2. Add environment variables in Codemagic dashboard:
#    - VITE_API_URL (your backend URL)
# 3. For iOS: Add your Apple code signing credentials in Codemagic UI
# 4. Push this file — builds trigger automatically

workflows:
  receipt-taker-android:
    name: Android Build
    max_build_duration: 30
    instance_type: linux_x2
    environment:
      node: 20
      java: 17
      android_signing:
        - receipt_taker_keystore  # Set up in Codemagic UI
      vars:
        VITE_API_URL: $VITE_API_URL
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
    scripts:
      - name: Install frontend deps
        script: cd frontend && npm ci
      - name: Build web app
        script: cd frontend && npm run build
      - name: Sync Capacitor
        script: cd frontend && npx cap sync android
      - name: Build Android
        script: |
          cd frontend/android
          chmod +x gradlew
          ./gradlew assembleDebug
    artifacts:
      - frontend/android/app/build/outputs/**/*.apk

  receipt-taker-ios:
    name: iOS Build
    max_build_duration: 30
    instance_type: mac_mini_m2  # Apple Silicon — fast builds
    environment:
      node: 20
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: app_store  # or 'development' for testing
        bundle_identifier: com.receipttaker.app
      vars:
        VITE_API_URL: $VITE_API_URL
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
    scripts:
      - name: Install frontend deps
        script: cd frontend && npm ci
      - name: Build web app
        script: cd frontend && npm run build
      - name: Sync Capacitor
        script: cd frontend && npx cap sync ios
      - name: Install CocoaPods
        script: cd frontend/ios/App && pod install
      - name: Set Xcode project settings
        script: |
          cd frontend/ios/App
          xcodebuild -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath build/App.xcarchive \
            archive
      - name: Export IPA
        script: |
          cd frontend/ios/App
          xcodebuild -exportArchive \
            -archivePath build/App.xcarchive \
            -exportOptionsPlist App/ExportOptions.plist \
            -exportPath build/ipa
    artifacts:
      - frontend/ios/App/build/ipa/*.ipa
    publishing:
      app_store_connect:
        # Uncomment after connecting your Apple account in Codemagic UI
        # api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        # key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        # issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
